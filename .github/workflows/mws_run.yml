name: MWS Portfolio Run

on:
  # Weekdays at market open  (13:30 UTC = 9:30 AM ET)
  #   Runs Python analytics + compliance digest. The 10 AM Claude Code session
  #   then git-pulls these outputs and adds live news overlay + trade proposals.
  # Weekdays 30 min after price fetch   (22:00 UTC =  6:00 PM ET)
  #   ↑ mws_daily.yml fetches prices at 21:30 UTC; this run is offset +30 min
  #     to ensure fresh prices are committed before this run checks out the repo.
  # First-Monday-of-month rebalance check is handled by the runner
  # reading the policy triggers, not by cron filtering
  schedule:
    - cron: "30 13 * * 1-5"
    - cron: "0 22 * * 1-5"

  # Manual on-demand trigger from GitHub Actions UI or API
  workflow_dispatch:
    inputs:
      trigger_reason:
        description: "Why is this run being triggered?"
        required: false
        default: "manual"
      skip_llm:
        description: "Skip LLM call; send compliance digest instead (default: true). Set false for on-demand full LLM run."
        required: false
        default: "true"
        type: boolean

jobs:
  mws-run:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit precomputed targets + policy runtime back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test suite (pre-flight gate)
        # Runs before any data fetch or portfolio computation.
        # On failure: emails a test-failure alert and aborts the workflow so
        # no trade recommendation is produced from broken analytics code.
        id: test-suite
        continue-on-error: true
        run: |
          set -o pipefail
          python -m pytest tests/ -q --tb=short --no-header 2>&1 | tee pytest_output.txt

      - name: Email test failure alert and abort
        # Runs only when test-suite step failed.
        # Sends pytest output via Gmail, then exits 1 to fail the workflow.
        if: steps.test-suite.outcome == 'failure'
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
        run: |
          python3 - <<'PYEOF'
          import os, smtplib, sys
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from datetime import date

          today     = date.today().isoformat()
          password  = os.environ.get("GMAIL_APP_PASSWORD")
          from_addr = os.environ.get("GMAIL_FROM", "bhatnagar.vivek@gmail.com")
          to_addr   = os.environ.get("GMAIL_TO",   "bhatnagar.vivek@gmail.com")

          try:
              with open("pytest_output.txt") as f:
                  output = f.read()
          except FileNotFoundError:
              output = "(pytest output not captured)"

          print("=== TEST FAILURE — aborting MWS run ===")
          print(output)

          if not password:
              print("GMAIL_APP_PASSWORD not set — test alert not emailed (see logs above).")
          else:
              body = (
                  f"MWS test suite FAILED on {today}.\n"
                  "Portfolio run was aborted. No trades should be executed.\n\n"
                  "Fix the failing tests, push to main, and re-trigger the run.\n\n"
                  "=== pytest -q --tb=short output ===\n\n"
                  f"{output}"
              )
              msg = MIMEMultipart()
              msg["Subject"] = f"🚨 MWS TEST FAILURE {today} — RUN ABORTED"
              msg["From"]    = from_addr
              msg["To"]      = to_addr
              msg.attach(MIMEText(body, "plain", "utf-8"))
              with smtplib.SMTP_SSL("smtp.gmail.com", 465) as smtp:
                  smtp.login(from_addr, password)
                  smtp.sendmail(from_addr, to_addr, msg.as_string())
              print(f"Test failure alert emailed to {to_addr}.")
          PYEOF
          exit 1

      - name: Fetch latest price history (incremental — last 60 days)
        # Ensures mws_ticker_history.csv is current before analytics runs.
        # Belt-and-suspenders: mws_daily.yml also fetches at 5:30 PM ET and
        # commits the file; this step guarantees fresh prices even if that
        # commit is missing (e.g. after a long weekend or a forced push).
        run: python mws_fetch_history.py --days 60

      - name: Commit updated ticker history
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: price update before morning run [skip ci]"
          file_pattern: mws_ticker_history.csv
          commit_user_name: "MWS GitHub Runner"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

      - name: Run MWS analytics + send compliance digest
        # Default (SKIP_LLM=true): runs Python analytics, generates equity chart,
        # writes mws_precomputed_targets.json + mws_policy_runtime.json, and sends
        # a compliance digest email (sleeve status + Python-computed trade candidates).
        # Trade proposals with live news overlay are produced by the 10 AM Claude Code
        # session (WebSearch access required). To trigger an on-demand full LLM run:
        # GitHub Actions → MWS Portfolio Run → Run workflow → set skip_llm=false.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional: set ANTHROPIC_MODEL secret to override default model
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          TRIGGER_REASON: ${{ github.event.inputs.trigger_reason || 'scheduled' }}
          SKIP_LLM: ${{ github.event.inputs.skip_llm || 'true' }}
          FORCE_RECOMPUTE: "1"  # GH Actions resets all file mtimes to checkout time;
                                # mtime-based fast-exits are unreliable — always recompute
          MPLBACKEND: Agg   # headless matplotlib — no display needed
        run: python mws_runner.py

      - name: Commit run outputs back to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: MWS compliance digest [skip ci]"
          file_pattern: |
            mws_precomputed_targets.json
            mws_policy_runtime.json
            mws_run_results.csv
          commit_user_name: "MWS GitHub Runner"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
