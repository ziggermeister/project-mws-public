name: MWS Portfolio Run

on:
  # Weekdays 30 min after market open  (14:30 UTC = 10:30 AM ET)
  # Weekdays 30 min after price fetch   (22:00 UTC =  6:00 PM ET)
  #   ↑ mws_daily.yml fetches prices at 21:30 UTC; this run is offset +30 min
  #     to ensure fresh prices are committed before the LLM run checks out the repo.
  # First-Monday-of-month rebalance check is handled by the LLM runner
  # reading the policy triggers, not by cron filtering
  schedule:
    - cron: "30 14 * * 1-5"
    - cron: "0 22 * * 1-5"

  # Manual on-demand trigger from GitHub Actions UI or API
  workflow_dispatch:
    inputs:
      trigger_reason:
        description: "Why is this run being triggered?"
        required: false
        default: "manual"
      skip_llm:
        description: "Skip LLM call; send compliance digest instead (default: true). Set false for on-demand full LLM run."
        required: false
        default: "true"
        type: boolean

jobs:
  mws-run:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit precomputed targets + policy runtime back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run MWS analytics + send compliance digest
        # Default (SKIP_LLM=true): runs Python analytics, generates equity chart,
        # writes mws_precomputed_targets.json + mws_policy_runtime.json, and sends
        # a compliance digest email (sleeve status + Python-computed trade candidates).
        # Trade proposals with live news overlay are produced by the 10 AM Claude Code
        # session (WebSearch access required). To trigger an on-demand full LLM run:
        # GitHub Actions → MWS Portfolio Run → Run workflow → set skip_llm=false.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional: set ANTHROPIC_MODEL secret to override default model
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          TRIGGER_REASON: ${{ github.event.inputs.trigger_reason || 'scheduled' }}
          SKIP_LLM: ${{ github.event.inputs.skip_llm || 'true' }}
          MPLBACKEND: Agg   # headless matplotlib — no display needed
        run: python mws_runner.py

      - name: Commit run outputs back to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: MWS compliance digest [skip ci]"
          file_pattern: |
            mws_precomputed_targets.json
            mws_policy_runtime.json
            mws_run_results.csv
          commit_user_name: "MWS GitHub Runner"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
